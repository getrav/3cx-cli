<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="900" height="400" rx="12" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="450" y="35" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="600" fill="#94a3b8" text-anchor="middle">Architecture Overview</text>

  <!-- ── Left column: CLI Tools ── -->

  <!-- 3cx-call box -->
  <rect x="40" y="60" width="240" height="145" rx="10" fill="#020617" stroke="#38bdf8" stroke-width="1.5"/>
  <rect x="40" y="60" width="240" height="32" rx="10" fill="#38bdf8" opacity="0.12"/>
  <rect x="40" y="82" width="240" height="10" fill="#020617"/>
  <text x="160" y="82" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="14" font-weight="700" fill="#38bdf8" text-anchor="middle">3cx-call</text>
  <text x="60" y="110" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#94a3b8">status</text>
  <text x="130" y="110" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#94a3b8">call</text>
  <text x="185" y="110" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#94a3b8">devices</text>
  <text x="60" y="130" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#94a3b8">participant</text>
  <text x="160" y="130" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#94a3b8">action</text>
  <text x="60" y="150" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#94a3b8">listen</text>
  <text x="130" y="150" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#94a3b8">stream</text>
  <!-- Auth badge -->
  <rect x="55" y="168" width="100" height="22" rx="11" fill="#38bdf8" opacity="0.1"/>
  <text x="105" y="183" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="10" fill="#38bdf8" text-anchor="middle">Bearer API Key</text>

  <!-- 3cx-config box -->
  <rect x="40" y="225" width="240" height="160" rx="10" fill="#020617" stroke="#818cf8" stroke-width="1.5"/>
  <rect x="40" y="225" width="240" height="32" rx="10" fill="#818cf8" opacity="0.12"/>
  <rect x="40" y="247" width="240" height="10" fill="#020617"/>
  <text x="160" y="247" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="14" font-weight="700" fill="#818cf8" text-anchor="middle">3cx-config</text>
  <text x="60" y="275" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#94a3b8">users</text>
  <text x="105" y="275" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#94a3b8">departments</text>
  <text x="200" y="275" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#94a3b8">trunks</text>
  <text x="60" y="293" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#94a3b8">queues</text>
  <text x="115" y="293" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#94a3b8">ring-groups</text>
  <text x="210" y="293" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#94a3b8">ivrs</text>
  <text x="60" y="311" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#94a3b8">blacklist</text>
  <text x="130" y="311" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#94a3b8">recordings</text>
  <text x="215" y="311" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#94a3b8">backups</text>
  <text x="60" y="329" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#64748b">... 31 commands total</text>
  <!-- Auth badge -->
  <rect x="55" y="348" width="128" height="22" rx="11" fill="#818cf8" opacity="0.1"/>
  <text x="119" y="363" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="10" fill="#818cf8" text-anchor="middle">OAuth2 + Token Cache</text>

  <!-- ── Middle: Connection arrows ── -->

  <!-- Arrow: 3cx-call -> PBX (callcontrol) -->
  <line x1="280" y1="120" x2="380" y2="120" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="380,115 395,120 380,125" fill="#38bdf8"/>
  <text x="340" y="112" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="9" fill="#475569" text-anchor="middle">HTTPS</text>

  <!-- Arrow: 3cx-call -> PBX (WebSocket) -->
  <line x1="280" y1="160" x2="380" y2="160" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="2,3"/>
  <polygon points="375,155 390,160 375,165" fill="#38bdf8"/>
  <text x="340" y="178" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="9" fill="#475569" text-anchor="middle">WSS</text>

  <!-- Arrow: 3cx-config -> Token endpoint -->
  <path d="M280,305 Q330,305 370,260" fill="none" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="365,256 375,254 370,265" fill="#818cf8"/>

  <!-- Arrow: 3cx-config -> PBX (xapi) -->
  <line x1="280" y1="330" x2="380" y2="330" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="380,325 395,330 380,335" fill="#818cf8"/>
  <text x="340" y="348" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="9" fill="#475569" text-anchor="middle">HTTPS</text>

  <!-- ── Right column: 3CX PBX Server ── -->

  <rect x="395" y="60" width="280" height="330" rx="12" fill="#020617" stroke="#334155" stroke-width="1.5"/>
  <rect x="395" y="60" width="280" height="36" rx="12" fill="#334155" opacity="0.4"/>
  <rect x="395" y="86" width="280" height="10" fill="#020617"/>

  <!-- Server icon -->
  <rect x="415" y="70" width="16" height="16" rx="2" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="415" y1="78" x2="431" y2="78" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="426" cy="74" r="1.5" fill="#22c55e"/>

  <text x="440" y="83" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700" fill="#e2e8f0">3CX PBX Server</text>

  <!-- Call Control endpoint -->
  <rect x="415" y="108" width="240" height="82" rx="8" fill="#38bdf8" opacity="0.06" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.3"/>
  <text x="432" y="128" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="12" font-weight="600" fill="#38bdf8">/callcontrol/</text>
  <text x="432" y="148" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#64748b">REST endpoints for call operations</text>
  <text x="432" y="168" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="11" fill="#475569">/callcontrol/ws</text>
  <text x="570" y="168" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#64748b">Real-time events</text>

  <!-- Token endpoint -->
  <rect x="415" y="200" width="240" height="45" rx="8" fill="#fbbf24" opacity="0.06" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.3"/>
  <text x="432" y="220" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="12" font-weight="600" fill="#fbbf24">/connect/token</text>
  <text x="432" y="236" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#64748b">OAuth2 token exchange (60 min)</text>

  <!-- XAPI endpoint -->
  <rect x="415" y="255" width="240" height="60" rx="8" fill="#818cf8" opacity="0.06" stroke="#818cf8" stroke-width="1" stroke-opacity="0.3"/>
  <text x="432" y="275" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="12" font-weight="600" fill="#818cf8">/xapi/v1/</text>
  <text x="432" y="295" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#64748b">OData REST API for PBX config</text>
  <text x="432" y="308" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#64748b">Users, Trunks, Queues, Rules, ...</text>

  <!-- PBX internals -->
  <rect x="415" y="325" width="240" height="48" rx="8" fill="#334155" opacity="0.2"/>
  <text x="432" y="345" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#475569">SIP Engine  |  Call Router  |  DB</text>
  <text x="432" y="362" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#475569">Trunks  |  Queues  |  IVRs  |  Recordings</text>

  <!-- ── Far right: External ── -->
  <rect x="720" y="88" width="150" height="200" rx="10" fill="#020617" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="795" y="118" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600" fill="#64748b" text-anchor="middle">External</text>

  <!-- PSTN icon -->
  <rect x="740" y="132" width="110" height="30" rx="6" fill="#334155" opacity="0.3"/>
  <text x="795" y="152" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">PSTN / SIP Trunks</text>

  <!-- Phones icon -->
  <rect x="740" y="172" width="110" height="30" rx="6" fill="#334155" opacity="0.3"/>
  <text x="795" y="192" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">IP Phones</text>

  <!-- WebRTC icon -->
  <rect x="740" y="212" width="110" height="30" rx="6" fill="#334155" opacity="0.3"/>
  <text x="795" y="232" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Web / Mobile</text>

  <!-- Contacts -->
  <rect x="740" y="252" width="110" height="30" rx="6" fill="#334155" opacity="0.3"/>
  <text x="795" y="272" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">CRM / Contacts</text>

  <!-- Arrows: PBX -> External -->
  <line x1="675" y1="180" x2="735" y2="180" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="730,176 740,180 730,184" fill="#475569"/>
  <line x1="675" y1="230" x2="735" y2="230" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="730,226 740,230 730,234" fill="#475569"/>
</svg>
