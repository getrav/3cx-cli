<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>
  <!-- Phone icon -->
  <g transform="translate(60, 55)">
    <rect x="0" y="0" width="56" height="90" rx="8" fill="none" stroke="#38bdf8" stroke-width="2.5"/>
    <circle cx="28" cy="76" r="5" fill="#38bdf8" opacity="0.6"/>
    <rect x="16" y="8" width="24" height="4" rx="2" fill="#38bdf8" opacity="0.4"/>
    <rect x="6" y="18" width="44" height="48" rx="2" fill="#38bdf8" opacity="0.1"/>
    <!-- Signal waves -->
    <path d="M62 20 Q72 10 82 20" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.5"/>
    <path d="M58 12 Q73 -2 88 12" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.35"/>
    <path d="M54 4 Q74 -14 94 4" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.2"/>
  </g>
  <!-- Title -->
  <text x="180" y="95" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="48" font-weight="700" fill="white">3CX</text>
  <text x="282" y="95" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="48" font-weight="300" fill="#94a3b8"> CLI Tools</text>
  <!-- Subtitle -->
  <text x="180" y="125" font-family="ui-sans-serif,system-ui,sans-serif" font-size="18" fill="#64748b">Command-line interface for 3CX PBX management</text>
  <!-- Badges -->
  <g transform="translate(180, 142)">
    <rect x="0" y="0" width="90" height="24" rx="12" fill="#38bdf8" opacity="0.15"/>
    <text x="45" y="16" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#38bdf8" text-anchor="middle">Call Control</text>
    <rect x="100" y="0" width="110" height="24" rx="12" fill="#818cf8" opacity="0.15"/>
    <text x="155" y="16" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#818cf8" text-anchor="middle">Configuration</text>
    <rect x="220" y="0" width="86" height="24" rx="12" fill="#34d399" opacity="0.15"/>
    <text x="263" y="16" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#34d399" text-anchor="middle">31 commands</text>
    <rect x="316" y="0" width="70" height="24" rx="12" fill="#fbbf24" opacity="0.15"/>
    <text x="351" y="16" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#fbbf24" text-anchor="middle">Python 3</text>
  </g>
  <!-- Terminal prompt decoration -->
  <g transform="translate(630, 50)">
    <rect x="0" y="0" width="230" height="100" rx="8" fill="#020617" stroke="#334155" stroke-width="1"/>
    <circle cx="14" cy="12" r="4" fill="#ef4444"/>
    <circle cx="28" cy="12" r="4" fill="#fbbf24"/>
    <circle cx="42" cy="12" r="4" fill="#22c55e"/>
    <text x="12" y="38" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="11" fill="#64748b">$</text>
    <text x="24" y="38" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="11" fill="#38bdf8"> 3cx-call status</text>
    <text x="12" y="55" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="11" fill="#22c55e">  Connected (ext 100)</text>
    <text x="12" y="75" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="11" fill="#64748b">$</text>
    <text x="24" y="75" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="11" fill="#818cf8"> 3cx-config version</text>
    <text x="12" y="92" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="11" fill="#22c55e">  "20.0.5.551"</text>
  </g>
</svg>
